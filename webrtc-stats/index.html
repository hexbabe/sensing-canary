<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Canary WebRTC Stats</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: monospace; background: #1a1a1a; color: #e0e0e0; padding: 16px; }
    h1 { font-size: 16px; margin-bottom: 12px; color: #ffd700; }
    .camera-panel { border: 1px solid #333; border-radius: 4px; padding: 12px; margin-bottom: 16px; }
    .camera-panel h2 { font-size: 14px; margin-bottom: 8px; color: #88cc88; }
    video { max-width: 320px; height: auto; background: #000; display: block; margin-bottom: 8px; border-radius: 2px; }
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 4px; }
    .stat { padding: 4px 8px; background: #222; border-radius: 2px; font-size: 13px; }
    .stat .label { color: #888; }
    .stat .value { color: #4fc3f7; font-weight: bold; }
    .stat.error .value { color: #ff5252; }
    .stat.ok .value { color: #69f0ae; }
    #status { padding: 8px; margin-bottom: 12px; background: #222; border-radius: 2px; font-size: 13px; }
    #status.connecting { border-left: 3px solid #ffd700; }
    #status.connected { border-left: 3px solid #69f0ae; }
    #status.error { border-left: 3px solid #ff5252; }
    #json-output { margin-top: 16px; padding: 12px; background: #111; border-radius: 4px; font-size: 12px; white-space: pre-wrap; max-height: 400px; overflow-y: auto; display: none; }
  </style>
</head>
<body>
  <h1>🐤 Canary WebRTC Stats</h1>
  <div id="status" class="connecting">Initializing...</div>
  <div id="cameras"></div>
  <div id="json-output"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
